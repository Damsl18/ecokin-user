<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carte — EcoKin</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="site-header"></div>

<main class="page">
  <div class="container page-head">
    <h1 style="font-size:1.5rem;">Carte de Kinshasa</h1>
    <p>Les signalements validés de la communauté, et tes propres signalements en attente.</p>
  </div>

  <div class="container">
    <div class="map-wrap mb-2">
      <div id="map"></div>
    </div>
    <div class="map-legend">
      <span><span class="dot" style="background:#4CAF50;"></span> Traité</span>
      <span><span class="dot" style="background:#2D6CDF;"></span> Validé / en cours</span>
      <span><span class="dot" style="background:#E8A33D;"></span> Mon signalement (en attente)</span>
      <span><span class="dot" style="background:#2E7D32;"></span> Point de collecte</span>
      <span><span class="dot" style="background:#C0392B;"></span> Zone à risque</span>
    </div>
  </div>
</main>

<div id="bottom-nav-slot"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/include.js"></script>
<script src="js/carte.js"></script>
</body>
</html>
