<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mes signalements — EcoKin</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="site-header"></div>

<main class="page">
  <div class="container page-head">
    <h1 style="font-size:1.5rem;">Mes signalements</h1>
    <p>Suis l'état de traitement de tes signalements.</p>
  </div>

  <div class="container">
    <div class="filters-bar">
      <select id="statutFilter" class="form-select">
        <option value="">Tous les statuts</option>
        <option value="en_attente">En attente</option>
        <option value="valide">Validé</option>
        <option value="en_cours">En cours</option>
        <option value="traite">Traité</option>
        <option value="rejete">Rejeté</option>
      </select>
    </div>

    <table class="data-table">
      <thead>
        <tr><th>Description</th><th>Adresse</th><th>Date</th><th>Statut</th></tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="4"><div class="spinner" style="margin:1rem auto;"></div></td></tr>
      </tbody>
    </table>
  </div>
</main>

<div id="bottom-nav-slot"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/include.js"></script>
<script src="js/signalements-mes.js"></script>
</body>
</html>
