<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nouveau signalement — EcoKin</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="site-header"></div>

<main class="page">
  <div class="container page-head">
    <h1 style="font-size:1.5rem;">Signaler un problème</h1>
    <p>Décris ce que tu observes, place-le sur la carte, et envoie.</p>
  </div>

  <div class="container" style="max-width:640px;">
    <form id="signalementForm" novalidate>
      <div class="mb-3">
        <label class="form-label" for="description">Description</label>
        <textarea class="form-control" id="description" rows="4" required placeholder="Ex : Dépôt sauvage de déchets ménagers sur l'avenue…"></textarea>
      </div>

      <div class="mb-3">
        <label class="form-label" for="adresse">Adresse</label>
        <input type="text" class="form-control" id="adresse" required placeholder="Ex : Avenue de la Paix, Gombe">
      </div>

      <div class="mb-3">
        <label class="form-label">Position sur la carte <span style="font-weight:400; color:var(--c-ink-soft);">(clique pour placer le repère)</span></label>
        <div class="mini-map" id="map" style="height:280px;"></div>
        <div class="form-text" id="coordsText">Aucune position sélectionnée.</div>
      </div>

      <div class="mb-3">
        <label class="form-label">Photo <span style="font-weight:400; color:var(--c-ink-soft);">(optionnelle, JPG/PNG/WEBP, 5 Mo max)</span></label>
        <label class="upload-drop" id="uploadDrop" for="photoInput">
          <div id="uploadPlaceholder"><i class="fa-solid fa-camera" style="font-size:1.4rem;"></i><p class="mb-0 mt-2">Toucher pour ajouter une photo</p></div>
          <img id="uploadPreview" style="display:none;">
        </label>
        <input type="file" id="photoInput" accept="image/jpeg,image/png,image/webp" style="display:none;">
      </div>

      <div id="formError" class="text-danger mb-2" style="font-size:0.88rem; display:none;"></div>
      <button class="btn btn-primary btn-block" type="submit" id="submitBtn">Envoyer le signalement</button>
    </form>
  </div>
</main>

<div id="bottom-nav-slot"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/include.js"></script>
<script src="js/signalement-nouveau.js"></script>
</body>
</html>
