<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon profil — EcoKin</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="site-header"></div>

<main class="page">
  <div class="container page-head">
    <h1 style="font-size:1.5rem;">Mon profil</h1>
  </div>

  <div class="container" style="max-width:520px;">
    <form id="profileForm" class="mb-4" novalidate>
      <h3 style="font-size:1.05rem;">Informations personnelles</h3>
      <div class="row g-2 mb-2">
        <div class="col-6">
          <label class="form-label" for="prenom">Prénom</label>
          <input type="text" class="form-control" id="prenom" required>
        </div>
        <div class="col-6">
          <label class="form-label" for="nom">Nom</label>
          <input type="text" class="form-control" id="nom" required>
        </div>
      </div>
      <div class="mb-2">
        <label class="form-label" for="email">Email</label>
        <input type="email" class="form-control" id="email" disabled>
        <div class="form-text">L'email ne peut pas être modifié.</div>
      </div>
      <div class="mb-3">
        <label class="form-label" for="commune">Commune</label>
        <input type="text" class="form-control" id="commune" required>
      </div>
      <div id="profileMsg" class="mb-2" style="font-size:0.88rem; display:none;"></div>
      <button class="btn btn-primary" type="submit" id="profileBtn">Enregistrer</button>
    </form>

    <form id="passwordForm" class="mb-4" novalidate>
      <h3 style="font-size:1.05rem;">Changer le mot de passe</h3>
      <div class="mb-2">
        <label class="form-label" for="currentPassword">Mot de passe actuel</label>
        <input type="password" class="form-control" id="currentPassword" required autocomplete="current-password">
      </div>
      <div class="mb-3">
        <label class="form-label" for="newPassword">Nouveau mot de passe</label>
        <input type="password" class="form-control" id="newPassword" minlength="6" required autocomplete="new-password">
      </div>
      <div id="passwordMsg" class="mb-2" style="font-size:0.88rem; display:none;"></div>
      <button class="btn btn-outline" type="submit" id="passwordBtn">Modifier le mot de passe</button>
    </form>

    <button class="btn btn-ghost text-danger" id="logoutBtnProfile" type="button"><i class="fa-solid fa-right-from-bracket"></i> Déconnexion</button>
  </div>
</main>

<div id="bottom-nav-slot"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/include.js"></script>
<script src="js/profil.js"></script>
</body>
</html>
