<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription — EcoKin</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card" style="max-width:460px;">
    <div class="auth-card__logo"><i class="fa-solid fa-leaf"></i> EcoKin</div>
    <h1 style="font-size:1.4rem;">Rejoindre EcoKin</h1>
    <p style="font-size:0.9rem;">Crée ton compte citoyen pour signaler et publier.</p>

    <form id="registerForm" novalidate>
      <div class="row g-2 mb-2">
        <div class="col-6">
          <label class="form-label" for="prenom">Prénom</label>
          <input type="text" class="form-control" id="prenom" required>
        </div>
        <div class="col-6">
          <label class="form-label" for="nom">Nom</label>
          <input type="text" class="form-control" id="nom" required>
        </div>
      </div>
      <div class="mb-2">
        <label class="form-label" for="email">Email</label>
        <input type="email" class="form-control" id="email" required autocomplete="email">
      </div>
      <div class="mb-2">
        <label class="form-label" for="commune">Commune</label>
        <input type="text" class="form-control" id="commune" placeholder="Ex : Gombe, Limete, Ngaliema…" required>
      </div>
      <div class="mb-3">
        <label class="form-label" for="password">Mot de passe</label>
        <input type="password" class="form-control" id="password" minlength="6" required autocomplete="new-password">
        <div class="form-text">6 caractères minimum.</div>
      </div>
      <div id="formError" class="text-danger mb-2" style="font-size:0.88rem; display:none;"></div>
      <button class="btn btn-primary btn-block" type="submit" id="submitBtn">Créer mon compte</button>
    </form>

    <p class="text-center mt-3" style="font-size:0.9rem;">Déjà inscrit ? <a href="login.html">Connecte-toi</a></p>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/register.js"></script>
</body>
</html>
