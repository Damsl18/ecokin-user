<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mot de passe oublié — EcoKin</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-card__logo"><i class="fa-solid fa-leaf"></i> EcoKin</div>
    <h1 style="font-size:1.4rem;">Mot de passe oublié</h1>
    <p style="font-size:0.9rem;">Entre ton email. Si un compte existe, un lien de réinitialisation valable 1 heure te sera envoyé.</p>

    <form id="forgotForm" novalidate>
      <div class="mb-3">
        <label class="form-label" for="email">Email</label>
        <input type="email" class="form-control" id="email" required autocomplete="email">
      </div>
      <div id="formMsg" class="mb-2" style="font-size:0.88rem; display:none;"></div>
      <button class="btn btn-primary btn-block" type="submit" id="submitBtn">Envoyer le lien</button>
    </form>

    <p class="text-center mt-3" style="font-size:0.9rem;"><a href="login.html">← Retour à la connexion</a></p>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/forgot-password.js"></script>
</body>
</html>
