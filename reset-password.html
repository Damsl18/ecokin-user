<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Réinitialiser le mot de passe — EcoKin</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-card__logo"><i class="fa-solid fa-leaf"></i> EcoKin</div>
    <h1 style="font-size:1.4rem;">Nouveau mot de passe</h1>
    <p style="font-size:0.9rem;" id="introText">Choisis un nouveau mot de passe.</p>

    <form id="resetForm" novalidate>
      <div class="mb-3">
        <label class="form-label" for="newPassword">Nouveau mot de passe</label>
        <input type="password" class="form-control" id="newPassword" minlength="6" required autocomplete="new-password">
        <div class="form-text">6 caractères minimum.</div>
      </div>
      <div id="formMsg" class="mb-2" style="font-size:0.88rem; display:none;"></div>
      <button class="btn btn-primary btn-block" type="submit" id="submitBtn">Réinitialiser</button>
    </form>

    <p class="text-center mt-3" style="font-size:0.9rem;"><a href="login.html">← Retour à la connexion</a></p>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/reset-password.js"></script>
</body>
</html>
