<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Écrire un article — EcoKin</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="site-header"></div>

<main class="page">
  <div class="container page-head">
    <h1 style="font-size:1.5rem;" id="pageTitle">Écrire un article</h1>
    <p>Ton article sera vérifié par un administrateur avant publication.</p>
  </div>

  <div class="container" style="max-width:700px;">
    <form id="articleForm" novalidate>
      <div class="mb-3">
        <label class="form-label" for="titre">Titre</label>
        <input type="text" class="form-control" id="titre" required maxlength="255">
      </div>

      <div class="mb-3">
        <label class="form-label">Image de couverture <span style="font-weight:400; color:var(--c-ink-soft);">(optionnelle)</span></label>
        <label class="upload-drop" id="uploadDrop" for="coverInput">
          <div id="uploadPlaceholder"><i class="fa-solid fa-image" style="font-size:1.4rem;"></i><p class="mb-0 mt-2">Toucher pour ajouter une image</p></div>
          <img id="uploadPreview" style="display:none;">
        </label>
        <input type="file" id="coverInput" accept="image/jpeg,image/png,image/webp" style="display:none;">
      </div>

      <div class="mb-3">
        <label class="form-label" for="contenu">Contenu</label>
        <div class="editor-toolbar">
          <button type="button" id="boldBtn" title="Gras"><i class="fa-solid fa-bold"></i></button>
          <button type="button" id="italicBtn" title="Italique"><i class="fa-solid fa-italic"></i></button>
        </div>
        <textarea class="form-control" id="contenu" rows="10" required placeholder="Rédige ton article ici. Sélectionne du texte puis clique sur G ou I pour le mettre en forme."></textarea>
      </div>

      <div id="formError" class="text-danger mb-2" style="font-size:0.88rem; display:none;"></div>
      <button class="btn btn-primary btn-block" type="submit" id="submitBtn">Soumettre pour validation</button>
    </form>
  </div>
</main>

<div id="bottom-nav-slot"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/include.js"></script>
<script src="js/articles-ecrire.js"></script>
</body>
</html>
