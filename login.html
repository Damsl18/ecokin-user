<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — EcoKin</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-card__logo"><i class="fa-solid fa-leaf"></i> EcoKin</div>
    <h1 style="font-size:1.4rem;">Bon retour</h1>
    <p style="font-size:0.9rem;">Connecte-toi pour signaler, suivre tes signalements et publier des articles.</p>

    <form id="loginForm" novalidate>
      <div class="mb-3">
        <label class="form-label" for="email">Email</label>
        <input type="email" class="form-control" id="email" required autocomplete="email">
      </div>
      <div class="mb-2">
        <label class="form-label" for="password">Mot de passe</label>
        <input type="password" class="form-control" id="password" required autocomplete="current-password">
      </div>
      <div class="mb-3 text-end">
        <a href="forgot-password.html" style="font-size:0.85rem;">Mot de passe oublié ?</a>
      </div>
      <div id="formError" class="text-danger mb-2" style="font-size:0.88rem; display:none;"></div>
      <button class="btn btn-primary btn-block" type="submit" id="submitBtn">Se connecter</button>
    </form>

    <p class="text-center mt-3" style="font-size:0.9rem;">Pas encore de compte ? <a href="register.html">Inscris-toi</a></p>
    <p class="text-center"><a href="#" id="backToPublic" style="font-size:0.85rem;">← Retour au site public</a></p>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/login.js"></script>
</body>
</html>
